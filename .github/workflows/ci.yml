name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo clippy check
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Security audit (cargo-audit)
        run: cargo audit --deny warnings

      - name: Run Rust tests with coverage
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin --out Xml --out Html --output-dir coverage

      - name: Upload Rust coverage
        uses: actions/upload-artifact@v3
        with:
          name: rust-coverage
          path: coverage/

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npx eslint . --ext .ts,.tsx --max-warnings=0

      - name: Format check (Prettier)
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

      - name: Run Vitest unit tests with coverage
        run: npx vitest run --coverage

      - name: Security audit (npm audit)
        run: npm audit --audit-level=high

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage
          path: coverage/

  build:
    needs: [backend, frontend]
    strategy:
      matrix:
        os: [windows-latest]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: excelminer-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri portable version
        run: npm run tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: excelminer-portable
          path: src-tauri/target/release/bundle/
